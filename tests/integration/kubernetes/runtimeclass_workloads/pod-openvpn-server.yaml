apiVersion: v1
kind: Service
metadata:
  name: openvpn-server
  namespace: default
  labels:
    app: openvpn-server
spec:
  type: ClusterIP
  selector:
    app: openvpn-server
  ports:
  - protocol: UDP
    port: 1194
    targetPort: 1194
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: openvpn-server-config
  namespace: default
  labels:
    app: openvpn-server

data:
  server.conf: |
    port 1194
    proto udp
    dev tap
    ca /etc/openvpn/keys/ca.crt
    cert /etc/openvpn/keys/server.crt
    key /etc/openvpn/keys/server.key
    dh /etc/openvpn/keys/dh.pem
    server-bridge 10.8.0.1 255.255.255.0 10.8.0.100 10.8.0.200
    persist-key
    persist-tun
    keepalive 10 120
    cipher AES-256-CBC
    user nobody
    group nogroup
    status /var/log/openvpn-status.log
    verb 3
---

apiVersion: v1
kind: Secret
metadata:
  name: openvpn-server-secrets
  namespace: default
  labels:
    app: openvpn-server
  annotations:
    description: "Contains OpenVPN server certificates and keys"
type: Opaque
data:
  ca.crt: $BASE64_CA_CRT
  server.crt: $BASE64_SERVER_CRT
  server.key: $BASE64_SERVER_KEY
  dh.pem: $BASE64_DH_PEM
---

apiVersion: v1
kind: Pod
metadata:
  name: openvpn-server
  labels:
    app: openvpn-server
  namespace: default
spec:
  containers:
  - name: openvpn-server
    image: kylemanna/openvpn
    command: ["openvpn", "--config", "/etc/openvpn/server.conf"]
    # without 'privileged':
    # ERROR: Cannot open TUN/TAP dev /dev/net/tun: No such file or directory (errno=2)
    securityContext:
      # without 'privileged' but with 'securityContext':
      #ERROR: Cannot open TUN/TAP dev /dev/net/tun: Operation not permitted (errno=1)
      privileged: true
      capabilities:
        add:
          - NET_ADMIN
    # note: without proper kernel support:
    # ERROR: Cannot open TUN/TAP dev /dev/net/tun: No such device (errno=19)
    ports:
    - containerPort: 1194
      protocol: UDP
    volumeMounts:
    - name: openvpn-server-secrets
      mountPath: /etc/openvpn/keys
      readOnly: true
    - name: openvpn-config
      mountPath: /etc/openvpn/server.conf
      subPath: server.conf
      readOnly: true
    readinessProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - "netstat -anu | grep 1194"
      initialDelaySeconds: 5
      periodSeconds: 5
  volumes:
  - name: openvpn-server-secrets
    secret:
      secretName: openvpn-server-secrets
  - name: openvpn-config
    configMap:
      name: openvpn-server-config
  runtimeClassName: kata
