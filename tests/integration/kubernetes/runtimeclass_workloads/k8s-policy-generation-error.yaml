apiVersion: v1
kind: Pod
metadata:
  name: genpolicy-errors
spec:
  terminationGracePeriodSeconds: 0
  runtimeClassName: kata
  containers:
    - name: busybox
      image: mcr.microsoft.com/azure-storage/azurite:latest
      command: ["tail", "-f", "/dev/null"]
